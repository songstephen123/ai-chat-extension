<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Voice Assistant</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header>
    <div class="brand">
      <img src="../icons/icon48.png" alt="" class="brand-icon">
      <h1>语音助理</h1>
    </div>
    <button id="btn-settings" title="设置" aria-label="设置">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M4 7h9"/>
        <path d="M17 7h3"/>
        <path d="M4 17h3"/>
        <path d="M11 17h9"/>
        <circle cx="15" cy="7" r="2"/>
        <circle cx="9" cy="17" r="2"/>
      </svg>
    </button>
  </header>

  <main class="assistant-card">
    <div class="voice-orb" aria-hidden="true">
      <span></span>
    </div>
    <div class="state-copy">
      <p id="state-title">点击开始语音</p>
      <p id="state-detail">实时文字内容已隐藏</p>
    </div>
  </main>

  <div id="activity-line" class="hidden" aria-live="polite"></div>

  <div id="tool-status" class="hidden">
    <span id="tool-status-text"></span>
  </div>

  <footer>
    <div id="voice-status" class="hidden">
      <span id="voice-status-dot"></span>
      <span id="voice-status-text"></span>
    </div>
    <button id="btn-voice" title="语音对话">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 13v-2"/>
        <path d="M8 17V7"/>
        <path d="M12 20V4"/>
        <path d="M16 17V7"/>
        <path d="M20 13v-2"/>
      </svg>
    </button>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
