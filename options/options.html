<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Voice Assistant - Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Settings</h1>

    <section class="section">
      <h2>实时语音模型</h2>
      <div class="field">
        <label>Provider</label>
        <select id="realtimeProvider">
          <option value="glm">GLM Realtime</option>
          <option value="doubao">豆包实时语音</option>
        </select>
        <small>GLM 使用 JSON Realtime 协议；豆包端到端使用火山 openspeech dialogue 协议。</small>
      </div>
      <div class="field">
        <label>Model / Version</label>
        <input type="text" id="realtimeModel" placeholder="glm-realtime">
      </div>
      <div class="field">
        <label>Voice</label>
        <select id="realtimeVoice"></select>
      </div>
    </section>

    <section class="section">
      <h2>Provider 凭证</h2>
      <div class="field provider-credential" data-provider="glm">
        <label>智谱 API Key</label>
        <input type="password" id="glmApiKey" placeholder="Zhipu API Key">
        <small>从 <a href="https://open.bigmodel.cn" target="_blank">open.bigmodel.cn</a> 获取</small>
      </div>
      <div class="field provider-credential" data-provider="doubao" hidden>
        <label>豆包 App ID</label>
        <input type="text" id="doubaoAppId" placeholder="X-Api-App-ID">
      </div>
      <div class="field provider-credential" data-provider="doubao" hidden>
        <label>豆包 Access Key</label>
        <input type="password" id="doubaoAccessKey" placeholder="X-Api-Access-Key">
        <small>X-Api-App-Key、X-Api-Resource-Id 和 Endpoint 使用系统固定值。</small>
      </div>
    </section>

    <section class="section">
      <h2>Native Host 状态</h2>
      <div class="field">
        <label>Lark CLI / Native Host</label>
        <span id="larkStatus">检查中...</span>
      </div>
    </section>

    <div class="actions">
      <button id="btn-save" class="btn-primary">保存</button>
      <span id="save-status" class="hidden">已保存</span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
